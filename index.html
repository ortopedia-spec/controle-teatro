<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle Teatro</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --primary:#1a73e8;
      --success:#34A853;
      --warning:#FBBC05;
      --danger:#EA4335;
      --gray:#f5f5f5;
      --dark:#666;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:16px;background:var(--gray);font-family:Arial, sans-serif}
    .wrap{max-width:520px;margin:0 auto}
    h2{margin:0 0 12px;text-align:center}

    #reader{
      width:100%;
      height:360px;
      background:#000;
      border-radius:16px;
      overflow:hidden;
    }
    #reader video{width:100%;height:100%;object-fit:cover}

    button,input{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:0;
      font-size:16px;
    }
    button{
      background:var(--primary);
      color:#fff;
      margin-top:10px;
      cursor:pointer;
      font-weight:600;
    }
    button:disabled{opacity:.55;cursor:not-allowed}
    input{
      border:2px solid #ddd;
      background:#fff;
      margin-top:12px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:13px;
    }
    .b-ok{background:rgba(52,168,83,.15);color:var(--success)}
    .b-warn{background:rgba(251,188,5,.20);color:#7a5a00}
    .b-bad{background:rgba(234,67,53,.15);color:var(--danger)}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .mini{
      background:var(--gray);
      border-radius:14px;
      padding:12px;
      text-align:center;
    }
    .mini .lab{font-size:12px;color:var(--dark);margin-bottom:6px}
    .mini .val{font-size:28px;font-weight:800;color:#222;line-height:1}
    .row{margin-top:10px}
    .row .lab{font-size:12px;color:var(--dark);margin-bottom:6px}
    .row .val{font-size:16px;font-weight:600}

    .box-warn{
      background:#fff3e0;
      border-left:4px solid var(--warning);
      padding:12px;
      border-radius:14px;
      margin-top:10px;
    }
    .box-ok{
      background:#e8f5e9;
      border-left:4px solid var(--success);
      padding:12px;
      border-radius:14px;
      margin-top:10px;
    }

    .btn-secondary{background:#0f5bd6}
    .btn-danger{background:var(--danger)}
    .hint{font-size:12px;color:var(--dark);text-align:center;margin-top:10px}

    .toast{
      position:fixed;
      left:16px; right:16px; bottom:16px;
      padding:14px;
      border-radius:14px;
      color:#fff;
      text-align:center;
      box-shadow:0 2px 10px rgba(0,0,0,.2);
      z-index:9999;
      font-size:15px;
    }

    /* ====== Picker (lista suspensa) ====== */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      z-index:9998;
      padding:16px;
    }
    .modal{
      max-width:520px;
      margin:40px auto 0;
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      background:var(--primary);
      color:#fff;
      font-weight:700;
    }
    .modal-header button{
      width:auto;
      padding:8px 12px;
      margin:0;
      border-radius:10px;
      background:rgba(255,255,255,.18);
    }
    .modal-body{
      padding:12px;
    }
    .list{
      max-height:55vh;
      overflow:auto;
      margin-top:10px;
      border:1px solid #eee;
      border-radius:12px;
    }
    .item{
      padding:12px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }
    .item:hover{
      background:#f7faff;
    }
    .small{
      font-size:12px;
      color:#777;
      margin-top:4px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h2>🎭 Controle Teatro</h2>

    <div id="reader"></div>

    <button id="btnStart" onclick="startScanner()">📷 Iniciar câmera</button>
    <button id="btnStop" class="btn-danger" onclick="stopScanner()" style="display:none;">⏹️ Parar câmera</button>

    <!-- Busca por Nome -->
    <input id="nomeFiltro" placeholder="Digite um nome para filtrar (opcional)" />
    <button class="btn-secondary" onclick="abrirPicker()">🔎 Buscar pelo nome</button>

    <div class="card" id="out" style="display:none"></div>

    <div class="hint">Leitura principal por QR. Se necessário, busque pelo nome.</div>
  </div>

  <!-- Modal / Lista suspensa -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <div>Selecionar convidado</div>
        <button onclick="fecharPicker()">Fechar</button>
      </div>
      <div class="modal-body">
        <div style="font-size:13px;color:#555;">
          Dica: o filtro usa <b>contém</b>. Se estiver vazio, mostra todos.
        </div>
        <div class="list" id="listaNomes"></div>
      </div>
    </div>
  </div>

<script>
  // ✅ sua URL /exec
  const API_URL = "https://script.google.com/macros/s/AKfycbztyyJqTCJ_XxHF1J02a1YiTySkE4ZjExQ1zto3fs-LWnqeoHEzrLJ7pTp0gjlZeolizw/exec";

  let scanner = null;
  let cameraStarted = false;
  let scanEnabled = false;
  let currentId = null;

  const out = document.getElementById("out");
  const btnStart = document.getElementById("btnStart");
  const btnStop  = document.getElementById("btnStop");

  // lista cacheada [{id,nome}]
  let people = [];
  let peopleLoaded = false;

  function show(html){
    out.style.display = "block";
    out.innerHTML = html;
  }

  function toast(msg, type="ok"){
    const d = document.createElement("div");
    d.className = "toast";
    d.style.background = (type==="ok") ? "var(--success)" : (type==="warn") ? "#b07d00" : "var(--danger)";
    d.textContent = msg;
    document.body.appendChild(d);
    setTimeout(()=>{ d.style.opacity="0"; d.style.transition="opacity .4s"; }, 2400);
    setTimeout(()=>d.remove(), 2900);
  }

  async function api(action, payload){
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action, ...payload })
    });
    return await res.json();
  }

  async function buscar(id){
    currentId = id;
    show(`<span class="badge b-warn">⏳ Buscando...</span>`);

    try{
      const r = await api("buscar", { id });
      if (!r.ok) {
        show(`<span class="badge b-bad">❌ Erro</span><p>${r.data?.message || "Falha"}</p>`);
        return;
      }
      if (!r.data) {
        show(`<span class="badge b-bad">Não encontrado</span><p>ID: <b>${escapeHtml(id)}</b></p>`);
        return;
      }
      render(r.data);
    }catch(e){
      show(`<span class="badge b-bad">❌ Rede</span><p>${escapeHtml(e.message || String(e))}</p>`);
    }
  }

  function render(p){
    const confirmado = String(p.status||"").trim().toUpperCase() === "CONFIRMADO";
    const badge = confirmado
      ? `<span class="badge b-ok">✅ Entrada Confirmada</span>`
      : `<span class="badge b-warn">⏳ Aguardando Entrada</span>`;

    const precisaAdapt = String(p.precisaAdaptacao||"").trim().toUpperCase() === "SIM";
    const adaptBox = precisaAdapt
      ? `<div class="box-warn">
          <div style="font-weight:800;margin-bottom:6px;">⚠️ Necessidades especiais</div>
          <div><b>${escapeHtml(p.precisaAdaptacao || "")}</b></div>
          <div style="margin-top:6px;">${escapeHtml(p.descricaoAdaptacao || "Não especificado")}</div>
        </div>`
      : "";

    const confBox = (confirmado && p.dataConfirmacao)
      ? `<div class="box-ok">
          <div style="font-weight:800;margin-bottom:6px;">✅ Confirmado em</div>
          <div>${formatDateBr(p.dataConfirmacao)}</div>
        </div>`
      : "";

    const btnConfirm = confirmado
      ? `<button disabled>✅ Já confirmado</button>`
      : `<button onclick="confirmar()">✅ Confirmar Entrada</button>`;

    show(`
      ${badge}
      <h3 style="margin:10px 0 0;">${escapeHtml(p.nome || "---")}</h3>

      <div class="grid">
        <div class="mini">
          <div class="lab">Adultos</div>
          <div class="val">${Number(p.adultos||0)}</div>
        </div>
        <div class="mini">
          <div class="lab">Crianças</div>
          <div class="val">${Number(p.criancas||0)}</div>
        </div>
      </div>

      <div class="row">
        <div class="lab">Tipo de Convite</div>
        <div class="val">${escapeHtml(p.tipoConvite || "Não informado")}</div>
      </div>

      ${adaptBox}
      ${confBox}

      ${btnConfirm}
      <button class="btn-secondary" onclick="novaLeitura()">📱 Nova Leitura</button>
    `);
  }

  async function confirmar(){
    if (!currentId) return;

    show(`<span class="badge b-warn">⏳ Confirmando...</span>`);

    try{
      const r = await api("confirmar", { id: currentId });
      if (!r.ok) {
        toast(r.data?.message || "Falha ao confirmar", "bad");
        // mesmo assim volta para nova leitura (pedido seu)
        novaLeitura();
        return;
      }

      const resp = r.data;
      if (resp.success) toast(resp.message || "Confirmado!", "ok");
      else toast(resp.message || "Não confirmado", resp.alreadyConfirmed ? "warn" : "bad");

      // ✅ Pedido 2: após confirmar, limpa e abre para nova leitura
      novaLeitura();
    }catch(e){
      toast("Erro: " + (e.message || String(e)), "bad");
      novaLeitura();
    }
  }

  // ========= Scanner (mantém câmera ligada) =========
  async function startScanner(){
    if (!scanner) scanner = new Html5Qrcode("reader");

    try{
      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScan,
        () => {}
      );

      cameraStarted = true;
      scanEnabled = true;
      btnStart.disabled = true;
      btnStop.style.display = "block";
      toast("Câmera ativa. Aponte para o QR.", "ok");
    }catch(err){
      toast("Falha ao iniciar câmera: " + (err?.message || err), "bad");
    }
  }

  async function stopScanner(){
    if (!scanner || !cameraStarted) return;

    try{ await scanner.stop(); } catch(e){}
    try{ scanner.clear(); } catch(e){}

    cameraStarted = false;
    scanEnabled = false;
    btnStart.disabled = false;
    btnStop.style.display = "none";
    toast("Câmera parada.", "warn");
  }

  function onScan(txt){
    if (!scanEnabled) return;

    // pausa leitura sem desligar câmera
    scanEnabled = false;

    // processa
    buscar(String(txt).trim());
  }

  function novaLeitura(){
    // limpa UI
    currentId = null;
    out.style.display = "none";
    out.innerHTML = "";

    // volta a ler imediatamente
    if (cameraStarted) {
      scanEnabled = true;
      toast("Pronto para nova leitura.", "ok");
      return;
    }
    startScanner();
  }

  // ========= Picker por Nome =========
  function abrirPicker(){
    document.getElementById("overlay").style.display = "block";
    montarLista(); // monta com filtro atual
  }

  function fecharPicker(){
    document.getElementById("overlay").style.display = "none";
  }

  async function garantirListaCarregada(){
    if (peopleLoaded) return true;

    try{
      const r = await api("listar", {});
      if (!r.ok) throw new Error(r.data?.message || "Falha ao listar");
      people = Array.isArray(r.data) ? r.data : [];
      peopleLoaded = true;
      return true;
    }catch(e){
      toast("Não consegui carregar a lista de nomes. Verifique o deploy do WebApp.", "bad");
      return false;
    }
  }

  async function montarLista(){
    const ok = await garantirListaCarregada();
    if (!ok) return;

    const filtro = document.getElementById("nomeFiltro").value.trim().toLowerCase();
    const listEl = document.getElementById("listaNomes");
    listEl.innerHTML = "";

    const filtrados = filtro
      ? people.filter(p => (p.nome || "").toLowerCase().includes(filtro))
      : people;

    if (!filtrados.length){
      listEl.innerHTML = `<div class="item">Nenhum resultado para: <b>${escapeHtml(filtro)}</b></div>`;
      return;
    }

    filtrados.slice(0, 400).forEach(p => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div><b>${escapeHtml(p.nome)}</b></div>
        <div class="small">ID: ${escapeHtml(p.id)}</div>
      `;
      div.addEventListener("click", () => {
        fecharPicker();
        // pausa leitura para não disparar scan simultâneo
        scanEnabled = false;
        buscar(p.id);
      });
      listEl.appendChild(div);
    });

    if (filtrados.length > 400){
      const more = document.createElement("div");
      more.className = "item";
      more.innerHTML = `<div class="small">Mostrando apenas os primeiros 400 resultados. Refine o filtro.</div>`;
      listEl.appendChild(more);
    }
  }

  // atualiza lista ao digitar (sem ficar chamando backend)
  document.getElementById("nomeFiltro").addEventListener("input", () => {
    if (document.getElementById("overlay").style.display === "block") {
      montarLista();
    }
  });

  // Enter no filtro já abre a lista filtrada
  document.getElementById("nomeFiltro").addEventListener("keydown", (e) => {
    if (e.key === "Enter") abrirPicker();
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function formatDateBr(v){
    try{
      const d = new Date(v);
      if (isNaN(d.getTime())) return String(v);
      return d.toLocaleString("pt-BR");
    }catch{
      return String(v);
    }
  }
</script>
</body>
</html>
